name: Link Check

on:
  schedule:
    - cron: "0 14 * * 1" # every Monday at 14:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: link-check
  cancel-in-progress: true

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        env:
          # Check github.com links with the authenticated rate limit (1000/hr)
          # instead of the 60/hr anonymous pool, avoiding flaky 429 failures.
          GITHUB_TOKEN: ${{ github.token }}
        with:
          args: --config lychee.toml README.md
          fail: true
