name: Bump casks on schedule or request

on:
  workflow_dispatch:
    inputs:
      casks:
        description: Custom list of casks to livecheck and bump if outdated
        required: false
  schedule:
    # Every 2 hours 15 minutes past the hour
    - cron: "15 */2 * * *"

concurrency:
  group: autobump
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autobump:
    name: Autobump casks
    environment: starhaven
    env:
      HOMEBREW_DEVELOPER: 1
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Mint bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: true

      - name: Configure bot identity and tap remote
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BOT_USER="${APP_SLUG}[bot]"
          BOT_ID=$(gh api "/users/${BOT_USER}" --jq .id)
          BOT_EMAIL="${BOT_ID}+${BOT_USER}@users.noreply.github.com"

          git config --global user.name "${BOT_USER}"
          git config --global user.email "${BOT_EMAIL}"

          TAP_DIR=$(brew --repo p-linnane/homebrew-tap)
          git -C "${TAP_DIR}" remote set-url origin \
            "https://x-access-token:${APP_TOKEN}@github.com/p-linnane/homebrew-tap.git"

          {
            echo "BOT_USER=${BOT_USER}"
            echo "BOT_EMAIL=${BOT_EMAIL}"
          } >> "${GITHUB_ENV}"

      - name: Bump casks
        id: autobump
        env:
          HOMEBREW_TEST_BOT_AUTOBUMP: 1
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.app-token.outputs.token }}
          HOMEBREW_GIT_COMMITTER_NAME: ${{ env.BOT_USER }}
          HOMEBREW_GIT_COMMITTER_EMAIL: ${{ env.BOT_EMAIL }}
          CASKS: ${{ inputs.casks }}
        continue-on-error: true
        run: |
          BREW_BUMP=(brew bump --no-fork --open-pr --casks)
          if [[ -n "${CASKS-}" ]]; then
            xargs "${BREW_BUMP[@]}" <<<"${CASKS}"
          else
            "${BREW_BUMP[@]}" --tap=p-linnane/homebrew-tap
          fi
