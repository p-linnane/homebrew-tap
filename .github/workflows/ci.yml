name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      casks:
        description: Cask tokens to check, separated by spaces or commas. Defaults to all casks.
        required: false
        default: ""
        type: string
      install:
        description: Install and uninstall selected casks after fetch and audit.
        required: false
        default: false
        type: boolean

defaults:
  run:
    shell: bash -xeuo pipefail {0}

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_ENV_HINTS: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  syntax:
    name: Syntax
    runs-on: macos-26
    permissions:
      contents: read
    outputs:
      casks: ${{ steps.casks.outputs.casks }}
      install: ${{ steps.casks.outputs.install }}
      matrix: ${{ steps.casks.outputs.matrix }}
    steps:
      - name: Set up Homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          core: true
          cask: true
          stable: false

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve cask list
        id: casks
        env:
          INPUT_CASKS: ${{ inputs.casks }}
          INPUT_INSTALL: ${{ inputs.install }}
        run: |
          tokens=()
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_CASKS//[[:space:],]/}" ]]; then
            normalized="${INPUT_CASKS//,/ }"
            read -r -a tokens <<< "${normalized}"
          else
            # bash 3.2 on the macOS runner has no mapfile; read into the array.
            while IFS= read -r token; do
              tokens+=("${token}")
            done < <(find Casks -maxdepth 1 -type f -name "*.rb" -exec basename {} .rb \; | sort)
          fi
          if [[ "${#tokens[@]}" -gt 0 ]]; then
            deduped=()
            while IFS= read -r token; do
              deduped+=("${token}")
            done < <(printf "%s\n" "${tokens[@]}" | sort -u)
            tokens=("${deduped[@]}")
          fi

          if [[ "${#tokens[@]}" -eq 0 ]]; then
            echo "::error::No casks selected"
            exit 1
          fi

          for token in "${tokens[@]}"; do
            if [[ ! "${token}" =~ ^[a-z0-9][a-z0-9_.+-]*$ ]]; then
              echo "::error::Invalid cask token: ${token}"
              exit 1
            fi
            if [[ ! -f "Casks/${token}.rb" ]]; then
              echo "::error::Unknown cask token: ${token}"
              exit 1
            fi
          done

          {
            printf "casks="
            printf "%s\n" "${tokens[@]}" | jq -R . | jq -s -c .
          } >> "${GITHUB_OUTPUT}"

          matrix_json="$(
            printf "%s\n" "${tokens[@]}" | jq -R -s -c '
              split("\n")[:-1] | {
                include: (map({cask: ., runner: "macos-26"}))
              }
            '
          )"
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"

          install=false
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${INPUT_INSTALL}" == "true" ]]; then
            install=true
          fi
          echo "install=${install}" >> "${GITHUB_OUTPUT}"

      - name: Verify tap syntax
        run: brew test-bot --tap "${GITHUB_REPOSITORY}" --only-tap-syntax

  cask:
    name: ${{ matrix.cask }} (${{ matrix.runner }})
    needs: syntax
    if: ${{ github.event_name != 'push' }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.syntax.outputs.matrix) }}
    steps:
      - name: Set up Homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          core: true
          cask: true
          stable: false

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch cask
        env:
          CASK: ${{ matrix.cask }}
        run: brew fetch --cask --retry --force "${GITHUB_REPOSITORY}/${CASK}"
        timeout-minutes: 30

      - name: Audit cask
        env:
          CASK: ${{ matrix.cask }}
        run: brew audit --cask --online --strict "${GITHUB_REPOSITORY}/${CASK}"
        timeout-minutes: 30

      - name: Install cask
        id: install
        if: needs.syntax.outputs.install == 'true'
        env:
          CASK: ${{ matrix.cask }}
        run: brew install --cask "${GITHUB_REPOSITORY}/${CASK}"
        timeout-minutes: 30

      - name: Uninstall cask
        if: always() && needs.syntax.outputs.install == 'true' && steps.install.outcome == 'success'
        env:
          CASK: ${{ matrix.cask }}
        run: brew uninstall --cask --force --zap "${CASK}"
        timeout-minutes: 30

  conclusion:
    name: conclusion
    needs:
      - syntax
      - cask
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Result
        env:
          CASK_RESULT: ${{ needs.cask.result }}
          EVENT_NAME: ${{ github.event_name }}
          SYNTAX_RESULT: ${{ needs.syntax.result }}
        run: |
          test "${SYNTAX_RESULT}" = "success"
          if [[ "${EVENT_NAME}" != "push" ]]; then
            test "${CASK_RESULT}" = "success"
          fi
